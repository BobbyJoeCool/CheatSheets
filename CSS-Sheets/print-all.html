<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CSS Reference — Print All</title>
		<link rel="stylesheet" href="../CSS/cheatsheet.css" />
		<link rel="stylesheet" href="../CSS/css-layout.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
		<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js" defer></script>
		<style>
			/* Override cheatsheet.css body — becomes a scroll container here */
			body {
				width: 100%;
				height: auto;
				margin: 0;
				padding: 0;
				padding-top: 52px;
				background: var(--bg-page);
				display: flex;
				flex-direction: column;
				align-items: center;
				overflow-x: hidden;
				position: static;
				box-shadow: none;
				font-size: inherit;
			}

			/* ── Fixed top bar ──────────────────────────────── */
			#print-bar {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				height: 44px;
				background: var(--bg-body);
				border-bottom: 1px solid var(--border-section);
				display: flex;
				align-items: center;
				gap: 12px;
				padding: 0 20px;
				z-index: 100;
			}
			#back-link {
				font-family: var(--font-code);
				font-size: 10px;
				color: var(--text-link);
				text-decoration: none;
			}
			#back-link:hover {
				color: var(--accent-purple);
			}
			#bar-title {
				font-family: var(--font-code);
				font-size: 11px;
				color: var(--accent-purple);
				font-weight: 600;
				letter-spacing: 0.5px;
			}
			#status {
				font-family: var(--font-code);
				font-size: 10px;
				color: var(--text-muted);
			}
			#print-btn {
				margin-left: auto;
				background: var(--accent-primary);
				color: #fff;
				border: none;
				padding: 5px 16px;
				border-radius: 4px;
				font-family: var(--font-code);
				font-size: 10px;
				font-weight: 600;
				letter-spacing: 0.5px;
				cursor: pointer;
				transition: background 0.2s;
			}
			#print-btn:hover {
				background: var(--accent-purple);
			}
			#print-btn:disabled {
				opacity: 0.5;
				cursor: default;
			}

			/* ── Each injected sheet (mirrors body in cheatsheet.css) ── */
			.sheet-page {
				width: var(--page-width);
				height: var(--page-height);
				background: var(--bg-body);
				padding: var(--margin);
				padding-bottom: calc(var(--footer-height) + 0.3in);
				font-size: 10px;
				font-family: var(--font-body);
				color: var(--text-primary);
				line-height: 1.5;
				-webkit-font-smoothing: antialiased;
				overflow: hidden;
				position: relative;
				box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
				box-sizing: border-box;
				margin: 20px 0;
			}

			/* ── Print ──────────────────────────────────────── */
			@media print {
				@page {
					size: letter portrait;
					margin: 0;
				}
				#print-bar {
					display: none;
				}
				body {
					padding-top: 0;
					display: block;
				}
				.sheet-page {
					margin: 0;
					box-shadow: none;
					page-break-after: always;
					break-after: page;
				}
				.sheet-page:last-child {
					page-break-after: auto;
					break-after: auto;
				}
			}
		</style>
	</head>
	<body>
		<div id="print-bar">
			<a href="index.html" id="back-link">← Index</a>
			<span id="bar-title">CSS REFERENCE · PRINT ALL</span>
			<span id="status"></span>
			<button id="print-btn" type="button">Print All</button>
		</div>

		<div id="sheets-container"></div>

		<script>
			const btn = document.getElementById('print-btn');
			const status = document.getElementById('status');
			const container = document.getElementById('sheets-container');

			btn.addEventListener('click', async () => {
				btn.disabled = true;
				status.textContent = 'Loading…';
				container.innerHTML = '';

				try {
					const { pages } = await fetch('manifest.json').then(r => r.json());
					const texts = await Promise.all(pages.map(p => fetch(p.file).then(r => r.text())));

					const parser = new DOMParser();
					texts.forEach((html, i) => {
						const doc = parser.parseFromString(html, 'text/html');
						const wrapper = document.createElement('div');
						wrapper.className = 'sheet-page';
						const bodyId = doc.body.getAttribute('id');
						if (bodyId) wrapper.id = bodyId;
						wrapper.innerHTML = doc.body.innerHTML;
						container.appendChild(wrapper);
						status.textContent = `${i + 1} / ${pages.length}`;
					});

					if (window.Prism) Prism.highlightAll();

					status.textContent = `${pages.length} sheets ready`;
					btn.disabled = false;
					window.print();
				} catch (err) {
					status.textContent = 'Error: ' + err.message;
					btn.disabled = false;
				}
			});
		</script>
	</body>
</html>
