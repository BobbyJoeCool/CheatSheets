<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>HTML Reference — Table of Contents</title>
		<link rel="stylesheet" href="../CSS/cheatsheet.css" />
		<link rel="stylesheet" href="../CSS/html-cheatsheet.css" />
	</head>
	<body id="toc">
		<header class="page-header">
			<div class="sheet-number">HTML Reference</div>
			<h1>Table of Contents</h1>
			<div class="sheet-desc" id="toc-count"></div>
			<a id="print-all-btn" href="print-all.html">Print All</a>
		</header>

		<main class="toc" id="html-toc">
			<nav aria-label="HTML reference sheets" id="toc-nav"></nav>
		</main>

		<footer class="page-footer">
			<nav aria-label="Sheet navigation">
				<span></span>
				<span class="nav-toc" id="toc-footer-label"></span>
				<a class="nav-link next" id="toc-first-link" href="#" title="First sheet"></a>
			</nav>
		</footer>

		<script>
			document.addEventListener('DOMContentLoaded', async () => {
				try {
					const { pages } = await fetch('manifest.json').then(r => r.json());
					const count = pages.length;

					document.getElementById('toc-count').textContent =
						`${count} reference sheets · syntax · examples · notes`;
					document.getElementById('toc-footer-label').textContent =
						`HTML Reference · ${count} sheets`;

					const firstLink = document.getElementById('toc-first-link');
					firstLink.href = pages[0].file;
					firstLink.textContent = pages[0].title;

					const nav = document.getElementById('toc-nav');
					pages.forEach((page, i) => {
						const a = document.createElement('a');
						a.id = `toc_entry_${i + 1}`;
						a.href = page.file;
						a.className = 'toc_entry';

						const h2 = document.createElement('h2');
						h2.textContent = `Sheet ${i + 1}`;

						const h3 = document.createElement('h3');
						h3.textContent = page.title;

						const p = document.createElement('p');
						p.textContent = page.desc;

						a.append(h2, h3, p);
						nav.appendChild(a);
					});
				} catch (err) {
					document.getElementById('toc-nav').textContent =
						'Error loading manifest: ' + err.message;
				}
			});
		</script>
	</body>
</html>
